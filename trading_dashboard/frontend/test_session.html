<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会话测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f0f2f5;
        }
        .test-section {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #40a9ff;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>会话功能测试</h1>
    
    <div class="test-section">
        <h2>1. 会话存储测试</h2>
        <button onclick="testSessionStorage()">测试会话存储</button>
        <div id="storage-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. 会话加载测试</h2>
        <button onclick="testSessionLoad()">测试会话加载</button>
        <div id="load-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. 会话更新测试</h2>
        <input type="text" id="test-value" placeholder="输入测试值">
        <button onclick="testSessionUpdate()">更新会话</button>
        <div id="update-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>4. 会话删除测试</h2>
        <button onclick="testSessionDelete()">删除会话</button>
        <div id="delete-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>5. 完整会话测试</h2>
        <button onclick="testCompleteSession()">完整会话测试</button>
        <div id="complete-result" class="result"></div>
    </div>

    <script>
        // 会话管理系统
        const SessionManager = {
            STORAGE_KEY: 'quant_trading_session',
            
            init() {
                const session = this.getSession();
                if (!session) {
                    this.createSession();
                }
                return session;
            },
            
            createSession() {
                const session = {
                    currentTab: 'dashboard',
                    currentSystemMode: 'ours',
                    theme: 'default',
                    account: 'account1',
                    portfolio: 'portfolio1',
                    sector: 'all',
                    lastActive: new Date().toISOString()
                };
                this.saveSession(session);
                return session;
            },
            
            saveSession(session) {
                try {
                    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(session));
                    return true;
                } catch (e) {
                    console.error('Failed to save session:', e);
                    return false;
                }
            },
            
            getSession() {
                try {
                    const sessionData = localStorage.getItem(this.STORAGE_KEY);
                    return sessionData ? JSON.parse(sessionData) : null;
                } catch (e) {
                    console.error('Failed to get session:', e);
                    return null;
                }
            },
            
            updateSession(key, value) {
                const session = this.getSession() || this.createSession();
                session[key] = value;
                session.lastActive = new Date().toISOString();
                return this.saveSession(session);
            },
            
            deleteSession() {
                try {
                    localStorage.removeItem(this.STORAGE_KEY);
                    return true;
                } catch (e) {
                    console.error('Failed to delete session:', e);
                    return false;
                }
            }
        };
        
        function testSessionStorage() {
            const session = SessionManager.createSession();
            const result = document.getElementById('storage-result');
            if (session) {
                result.innerHTML = '<strong>成功</strong>: 会话已创建并存储<br>' +
                    '会话内容: ' + JSON.stringify(session, null, 2);
            } else {
                result.innerHTML = '<strong>失败</strong>: 会话存储失败';
            }
        }
        
        function testSessionLoad() {
            const session = SessionManager.getSession();
            const result = document.getElementById('load-result');
            if (session) {
                result.innerHTML = '<strong>成功</strong>: 会话加载成功<br>' +
                    '会话内容: ' + JSON.stringify(session, null, 2);
            } else {
                result.innerHTML = '<strong>失败</strong>: 会话加载失败';
            }
        }
        
        function testSessionUpdate() {
            const testValue = document.getElementById('test-value').value;
            const success = SessionManager.updateSession('testValue', testValue);
            const result = document.getElementById('update-result');
            if (success) {
                const session = SessionManager.getSession();
                result.innerHTML = '<strong>成功</strong>: 会话更新成功<br>' +
                    '更新后会话: ' + JSON.stringify(session, null, 2);
            } else {
                result.innerHTML = '<strong>失败</strong>: 会话更新失败';
            }
        }
        
        function testSessionDelete() {
            const success = SessionManager.deleteSession();
            const result = document.getElementById('delete-result');
            if (success) {
                result.innerHTML = '<strong>成功</strong>: 会话删除成功';
            } else {
                result.innerHTML = '<strong>失败</strong>: 会话删除失败';
            }
        }
        
        function testCompleteSession() {
            const result = document.getElementById('complete-result');
            
            // 1. 创建会话
            const session1 = SessionManager.createSession();
            if (!session1) {
                result.innerHTML = '<strong>失败</strong>: 会话创建失败';
                return;
            }
            
            // 2. 更新会话
            const updateSuccess = SessionManager.updateSession('testField', 'testValue');
            if (!updateSuccess) {
                result.innerHTML = '<strong>失败</strong>: 会话更新失败';
                return;
            }
            
            // 3. 加载会话
            const session2 = SessionManager.getSession();
            if (!session2 || session2.testField !== 'testValue') {
                result.innerHTML = '<strong>失败</strong>: 会话加载失败';
                return;
            }
            
            result.innerHTML = '<strong>成功</strong>: 完整会话测试通过<br>' +
                '最终会话: ' + JSON.stringify(session2, null, 2);
        }
        
        // 页面加载时初始化
        window.onload = function() {
            console.log('会话测试页面加载完成');
            console.log('localStorage 可用:', typeof(Storage) !== 'undefined');
        };
    </script>
</body>
</html>
