<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化交易仪表盘</title>
    <!-- Ant Design CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.12.8/dist/reset.css">
    <!-- Ant Design Icons -->
    <script src="https://cdn.jsdelivr.net/npm/@ant-design/icons@5.2.6/dist/index.umd.js"></script>
    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- React Router -->
    <script src="https://unpkg.com/react-router-dom@6/umd/react-router-dom.development.js"></script>
    <!-- Ant Design -->
    <script src="https://cdn.jsdelivr.net/npm/antd@5.12.8/dist/antd.min.js"></script>
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.2/dist/axios.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
        }
        .app {
            min-height: 100vh;
        }
        .header {
            background: white;
            padding: 0 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            line-height: 64px;
            font-size: 16px;
            font-weight: bold;
        }
        .content {
            margin: 24px;
            padding: 24px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.09);
        }
        .card {
            margin-bottom: 24px;
        }
        .statistic {
            margin-bottom: 16px;
        }
        .chart {
            width: 100%;
            height: 400px;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { Card, Row, Col, Statistic, Button, Spin, Progress, Table, Alert, Select, Tag } = antd;
        const { ArrowUpOutlined, ArrowDownOutlined, CheckCircleOutlined, WarningOutlined, DashboardOutlined, SafetyCertificateOutlined, LineChartOutlined, PieChartOutlined, SettingOutlined } = antdIcons;
        const { BrowserRouter, Routes, Route, Link, useNavigate } = ReactRouterDOM;
        
        // API服务
        const api = axios.create({
            baseURL: 'http://localhost:8000/api',
            timeout: 10000
        });
        
        // 仪表盘页面
        function Dashboard() {
            const [loading, setLoading] = useState(true);
            const [portfolioData, setPortfolioData] = useState(null);
            const [healthData, setHealthData] = useState(null);
            
            useEffect(() => {
                const loadData = async () => {
                    try {
                        setLoading(true);
                        
                        // 获取投资组合数据
                        const portfolioRes = await api.post('/portfolio/overview', { portfolio_id: 'portfolio1' });
                        setPortfolioData(portfolioRes.data);
                        
                        // 获取健康状态
                        const healthRes = await api.get('/health/status');
                        setHealthData(healthRes.data);
                    } catch (error) {
                        console.error('加载数据失败:', error);
                    } finally {
                        setLoading(false);
                    }
                };
                
                loadData();
            }, []);
            
            if (loading) {
                return <div style={{ textAlign: 'center', padding: '100px' }}><Spin size="large" /></div>;
            }
            
            return (
                <div className="content">
                    <h1 style={{ marginBottom: '24px' }}>量化交易仪表盘</h1>
                    
                    {/* 系统状态 */}
                    <Card title="系统状态" className="card">
                        <Row gutter={16}>
                            <Col span={8}>
                                <Statistic 
                                    title="系统状态" 
                                    value={healthData?.status === 'healthy' ? '正常' : '异常'}
                                    prefix={healthData?.status === 'healthy' ? <CheckCircleOutlined style={{ color: '#52c41a' }} /> : <WarningOutlined style={{ color: '#faad14' }} />}
                                />
                            </Col>
                            <Col span={8}>
                                <Statistic 
                                    title="运行时间" 
                                    value={Math.round(healthData?.uptime / 3600)} 
                                    suffix="小时"
                                />
                            </Col>
                            <Col span={8}>
                                <Statistic 
                                    title="服务状态" 
                                    value={Object.values(healthData?.services || {}).filter(s => s === 'healthy').length} 
                                    suffix={`/` + Object.keys(healthData?.services || {}).length}
                                />
                            </Col>
                        </Row>
                    </Card>
                    
                    {/* 投资组合概览 */}
                    <Card title="投资组合概览" className="card">
                        <Row gutter={16}>
                            <Col span={8}>
                                <Statistic 
                                    title="总价值" 
                                    value={portfolioData?.total_value || 0} 
                                    precision={2}
                                    suffix="元"
                                />
                            </Col>
                            <Col span={8}>
                                <Statistic 
                                    title="总盈亏" 
                                    value={portfolioData?.total_pnl || 0} 
                                    precision={2}
                                    suffix="元"
                                    valueStyle={{ color: (portfolioData?.total_pnl || 0) >= 0 ? '#52c41a' : '#ff4d4f' }}
                                    prefix={(portfolioData?.total_pnl || 0) >= 0 ? <ArrowUpOutlined /> : <ArrowDownOutlined />}
                                />
                            </Col>
                            <Col span={8}>
                                <Statistic 
                                    title="盈亏比例" 
                                    value={(portfolioData?.total_pnl_pct || 0) * 100} 
                                    precision={2}
                                    suffix="%"
                                    valueStyle={{ color: (portfolioData?.total_pnl_pct || 0) >= 0 ? '#52c41a' : '#ff4d4f' }}
                                />
                            </Col>
                        </Row>
                        
                        <Row style={{ marginTop: '24px' }} gutter={16}>
                            <Col span={8}>
                                <Card size="small" title="夏普比率">
                                    <Statistic value={portfolioData?.sharpe_ratio || 0} precision={2} />
                                </Card>
                            </Col>
                            <Col span={8}>
                                <Card size="small" title="最大回撤">
                                    <Statistic 
                                        value={(portfolioData?.max_drawdown || 0) * 100} 
                                        precision={2} 
                                        suffix="%"
                                        valueStyle={{ color: '#ff4d4f' }}
                                    />
                                </Card>
                            </Col>
                            <Col span={8}>
                                <Card size="small" title="风险暴露">
                                    <Progress 
                                        percent={75} 
                                        status="normal" 
                                        strokeColor={{ from: '#108ee9', to: '#87d068' }}
                                    />
                                </Card>
                            </Col>
                        </Row>
                    </Card>
                    
                    {/* 快捷访问 */}
                    <Card title="快捷访问" className="card">
                        <Row gutter={16}>
                            <Col span={6}>
                                <Card 
                                    hoverable 
                                    style={{ textAlign: 'center', padding: '20px' }}
                                    onClick={() => window.location.href = '/risk'}
                                >
                                    <div style={{ fontSize: '24px', marginBottom: '8px' }}>🛡️</div>
                                    <div>风控监控</div>
                                </Card>
                            </Col>
                            <Col span={6}>
                                <Card 
                                    hoverable 
                                    style={{ textAlign: 'center', padding: '20px' }}
                                    onClick={() => window.location.href = '/performance'}
                                >
                                    <div style={{ fontSize: '24px', marginBottom: '8px' }}>📊</div>
                                    <div>绩效归因</div>
                                </Card>
                            </Col>
                            <Col span={6}>
                                <Card 
                                    hoverable 
                                    style={{ textAlign: 'center', padding: '20px' }}
                                    onClick={() => window.location.href = '/portfolio'}
                                >
                                    <div style={{ fontSize: '24px', marginBottom: '8px' }}>💰</div>
                                    <div>投资组合</div>
                                </Card>
                            </Col>
                            <Col span={6}>
                                <Card 
                                    hoverable 
                                    style={{ textAlign: 'center', padding: '20px' }}
                                    onClick={() => window.location.href = '/health'}
                                >
                                    <div style={{ fontSize: '24px', marginBottom: '8px' }}>🔧</div>
                                    <div>系统健康</div>
                                </Card>
                            </Col>
                        </Row>
                    </Card>
                </div>
            );
        }
        
        // 风控监控页面
        function RiskMonitoring() {
            const [loading, setLoading] = useState(false);
            const [varData, setVarData] = useState(null);
            const [stressTestData, setStressTestData] = useState(null);
            const [scenarios, setScenarios] = useState([]);
            const [selectedScenario, setSelectedScenario] = useState('2008_financial_crisis');
            
            useEffect(() => {
                const loadScenarios = async () => {
                    try {
                        const res = await api.get('/risk/scenarios');
                        setScenarios(res.data);
                    } catch (error) {
                        console.error('加载场景失败:', error);
                    }
                };
                
                loadScenarios();
            }, []);
            
            const calculateVaR = async () => {
                try {
                    setLoading(true);
                    const res = await api.post('/risk/var', {
                        returns: Array.from({ length: 100 }, () => (Math.random() - 0.5) * 0.02),
                        confidence_level: 0.95,
                        method: 'historical'
                    });
                    setVarData(res.data);
                } catch (error) {
                    console.error('计算VaR失败:', error);
                } finally {
                    setLoading(false);
                }
            };
            
            const runStressTest = async () => {
                try {
                    setLoading(true);
                    const res = await api.post('/risk/stress-test', {
                        portfolio_values: Array.from({ length: 100 }, (_, i) => 1000000 * (1 + i * 0.001 + Math.random() * 0.02)),
                        scenario: selectedScenario
                    });
                    setStressTestData(res.data);
                } catch (error) {
                    console.error('压力测试失败:', error);
                } finally {
                    setLoading(false);
                }
            };
            
            const scenarioMapping = {
                '2008_financial_crisis': '2008金融危机',
                '2020_covid': '2020新冠疫情',
                '2015_stock_crash': '2015股灾',
                '1987_black_monday': '1987黑色星期一',
                '2022_interest_rate_hike': '2022美联储加息'
            };
            
            return (
                <div className="content">
                    <h1 style={{ marginBottom: '24px' }}>风控监控</h1>
                    
                    {/* VaR/CVaR计算 */}
                    <Card title="VaR/CVaR计算" className="card">
                        <Row gutter={16}>
                            <Col span={8}>
                                <Button type="primary" onClick={calculateVaR} loading={loading}>
                                    计算VaR/CVaR
                                </Button>
                            </Col>
                        </Row>
                        
                        {varData && (
                            <Row style={{ marginTop: '24px' }} gutter={16}>
                                <Col span={8}>
                                    <Card size="small" title="VaR (95%)">
                                        <Statistic 
                                            value={varData.var * 100} 
                                            precision={2} 
                                            suffix="%"
                                            valueStyle={{ color: '#ff4d4f' }}
                                        />
                                    </Card>
                                </Col>
                                <Col span={8}>
                                    <Card size="small" title="CVaR (95%)">
                                        <Statistic 
                                            value={varData.cvar * 100} 
                                            precision={2} 
                                            suffix="%"
                                            valueStyle={{ color: '#ff4d4f' }}
                                        />
                                    </Card>
                                </Col>
                                <Col span={8}>
                                    <Card size="small" title="计算方法">
                                        <Statistic value={varData.method === 'historical' ? '历史模拟法' : varData.method} />
                                    </Card>
                                </Col>
                            </Row>
                        )}
                    </Card>
                    
                    {/* 压力测试 */}
                    <Card title="压力测试" className="card">
                        <Row gutter={16}>
                            <Col span={8}>
                                <Select
                                    style={{ width: 200 }}
                                    value={selectedScenario}
                                    onChange={setSelectedScenario}
                                >
                                    {scenarios.map(scenario => (
                                        <Select.Option key={scenario} value={scenario}>
                                            {scenarioMapping[scenario] || scenario}
                                        </Select.Option>
                                    ))}
                                </Select>
                            </Col>
                            <Col span={8}>
                                <Button type="primary" onClick={runStressTest} loading={loading}>
                                    运行压力测试
                                </Button>
                            </Col>
                        </Row>
                        
                        {stressTestData && (
                            <Row style={{ marginTop: '24px' }} gutter={16}>
                                <Col span={8}>
                                    <Card size="small" title="测试场景">
                                        <Statistic value={scenarioMapping[stressTestData.scenario] || stressTestData.scenario} />
                                    </Card>
                                </Col>
                                <Col span={8}>
                                    <Card size="small" title="估计损失">
                                        <Statistic 
                                            value={stressTestData.estimated_loss} 
                                            precision={2} 
                                            suffix="元"
                                            valueStyle={{ color: '#ff4d4f' }}
                                        />
                                    </Card>
                                </Col>
                                <Col span={8}>
                                    <Card size="small" title="损失比例">
                                        <Statistic 
                                            value={stressTestData.estimated_loss_pct * 100} 
                                            precision={2} 
                                            suffix="%"
                                            valueStyle={{ color: '#ff4d4f' }}
                                        />
                                    </Card>
                                </Col>
                            </Row>
                        )}
                    </Card>
                </div>
            );
        }
        
        // 投资组合页面
        function PortfolioMonitoring() {
            const [loading, setLoading] = useState(false);
            const [portfolioData, setPortfolioData] = useState(null);
            const [positionsData, setPositionsData] = useState(null);
            
            const loadData = async () => {
                try {
                    setLoading(true);
                    
                    // 获取投资组合概览
                    const portfolioRes = await api.post('/portfolio/overview', { portfolio_id: 'portfolio1' });
                    setPortfolioData(portfolioRes.data);
                    
                    // 获取持仓信息
                    const positionsRes = await api.post('/portfolio/positions', { portfolio_id: 'portfolio1' });
                    setPositionsData(positionsRes.data);
                } catch (error) {
                    console.error('加载数据失败:', error);
                } finally {
                    setLoading(false);
                }
            };
            
            useEffect(() => {
                loadData();
            }, []);
            
            return (
                <div className="content">
                    <h1 style={{ marginBottom: '24px' }}>投资组合监控</h1>
                    
                    {/* 投资组合概览 */}
                    <Card title="投资组合概览" className="card">
                        <Row gutter={16}>
                            <Col span={8}>
                                <Button type="primary" onClick={loadData} loading={loading}>
                                    刷新数据
                                </Button>
                            </Col>
                        </Row>
                        
                        {portfolioData && (
                            <Row style={{ marginTop: '24px' }} gutter={16}>
                                <Col span={6}>
                                    <Card size="small" title="总价值">
                                        <Statistic 
                                            value={portfolioData.total_value} 
                                            precision={2} 
                                            suffix="元"
                                        />
                                    </Card>
                                </Col>
                                <Col span={6}>
                                    <Card size="small" title="总盈亏">
                                        <Statistic 
                                            value={portfolioData.total_pnl} 
                                            precision={2} 
                                            suffix="元"
                                            valueStyle={{ color: portfolioData.total_pnl >= 0 ? '#52c41a' : '#ff4d4f' }}
                                        />
                                    </Card>
                                </Col>
                                <Col span={6}>
                                    <Card size="small" title="盈亏比例">
                                        <Statistic 
                                            value={portfolioData.total_pnl_pct * 100} 
                                            precision={2} 
                                            suffix="%"
                                            valueStyle={{ color: portfolioData.total_pnl_pct >= 0 ? '#52c41a' : '#ff4d4f' }}
                                        />
                                    </Card>
                                </Col>
                                <Col span={6}>
                                    <Card size="small" title="夏普比率">
                                        <Statistic value={portfolioData.sharpe_ratio} precision={2} />
                                    </Card>
                                </Col>
                            </Row>
                        )}
                    </Card>
                    
                    {/* 持仓分析 */}
                    <Card title="持仓分析" className="card">
                        {positionsData && (
                            <Table 
                                dataSource={positionsData.positions}
                                columns={[
                                    { title: '标的', dataIndex: 'symbol', key: 'symbol' },
                                    { title: '数量', dataIndex: 'quantity', key: 'quantity' },
                                    { title: '价格', dataIndex: 'price', key: 'price' },
                                    { title: '权重', dataIndex: 'weight', key: 'weight', render: (weight) => `${(weight * 100).toFixed(2)}%` },
                                    { 
                                        title: '盈亏', 
                                        dataIndex: 'pnl', 
                                        key: 'pnl',
                                        render: (pnl) => (
                                            <span style={{ color: pnl >= 0 ? '#52c41a' : '#ff4d4f' }}>
                                                {pnl >= 0 ? '+' : ''}{pnl.toFixed(2)}元
                                            </span>
                                        )
                                    },
                                ]}
                            />
                        )}
                    </Card>
                </div>
            );
        }
        
        // 绩效归因页面
        function PerformanceAttribution() {
            const [loading, setLoading] = useState(false);
            const [attributionData, setAttributionData] = useState(null);
            const [metricsData, setMetricsData] = useState(null);
            
            const calculateAttribution = async () => {
                try {
                    setLoading(true);
                    const res = await api.post('/performance/attribution', {
                        portfolio_returns: Array.from({ length: 100 }, () => (Math.random() - 0.4) * 0.01),
                        benchmark_returns: Array.from({ length: 100 }, () => (Math.random() - 0.5) * 0.01)
                    });
                    setAttributionData(res.data);
                } catch (error) {
                    console.error('计算归因失败:', error);
                } finally {
                    setLoading(false);
                }
            };
            
            const getMetrics = async () => {
                try {
                    setLoading(true);
                    const res = await api.get('/performance/metrics');
                    setMetricsData(res.data);
                } catch (error) {
                    console.error('获取指标失败:', error);
                } finally {
                    setLoading(false);
                }
            };
            
            return (
                <div className="content">
                    <h1 style={{ marginBottom: '24px' }}>绩效归因</h1>
                    
                    {/* 绩效归因计算 */}
                    <Card title="绩效归因计算" className="card">
                        <Row gutter={16}>
                            <Col span={8}>
                                <Button type="primary" onClick={calculateAttribution} loading={loading}>
                                    计算绩效归因
                                </Button>
                            </Col>
                            <Col span={8}>
                                <Button type="default" onClick={getMetrics} loading={loading}>
                                    获取性能指标
                                </Button>
                            </Col>
                        </Row>
                        
                        {attributionData && (
                            <Row style={{ marginTop: '24px' }} gutter={16}>
                                <Col span={6}>
                                    <Card size="small" title="总收益">
                                        <Statistic 
                                            value={attributionData.total_return * 100} 
                                            precision={2} 
                                            suffix="%"
                                            valueStyle={{ color: '#52c41a' }}
                                        />
                                    </Card>
                                </Col>
                                <Col span={6}>
                                    <Card size="small" title="基准收益">
                                        <Statistic 
                                            value={attributionData.benchmark_return * 100} 
                                            precision={2} 
                                            suffix="%"
                                        />
                                    </Card>
                                </Col>
                                <Col span={6}>
                                    <Card size="small" title="Alpha">
                                        <Statistic 
                                            value={attributionData.alpha * 100} 
                                            precision={2} 
                                            suffix="%"
                                            valueStyle={{ color: '#52c41a' }}
                                        />
                                    </Card>
                                </Col>
                                <Col span={6}>
                                    <Card size="small" title="信息比率">
                                        <Statistic value={attributionData.information_ratio} precision={2} />
                                    </Card>
                                </Col>
                            </Row>
                        )}
                    </Card>
                    
                    {/* 性能指标 */}
                    <Card title="性能指标" className="card">
                        {metricsData && (
                            <Row gutter={16}>
                                <Col span={6}>
                                    <Card size="small" title="夏普比率">
                                        <Statistic value={metricsData.sharpe_ratio} precision={2} />
                                    </Card>
                                </Col>
                                <Col span={6}>
                                    <Card size="small" title="索提诺比率">
                                        <Statistic value={metricsData.sortino_ratio} precision={2} />
                                    </Card>
                                </Col>
                                <Col span={6}>
                                    <Card size="small" title="卡玛比率">
                                        <Statistic value={metricsData.calmar_ratio} precision={2} />
                                    </Card>
                                </Col>
                                <Col span={6}>
                                    <Card size="small" title="最大回撤">
                                        <Statistic 
                                            value={metricsData.max_drawdown * 100} 
                                            precision={2} 
                                            suffix="%"
                                            valueStyle={{ color: '#ff4d4f' }}
                                        />
                                    </Card>
                                </Col>
                            </Row>
                        )}
                    </Card>
                </div>
            );
        }
        
        // 系统健康页面
        function SystemHealth() {
            const [loading, setLoading] = useState(false);
            const [statusData, setStatusData] = useState(null);
            const [metricsData, setMetricsData] = useState(null);
            
            const refreshData = async () => {
                try {
                    setLoading(true);
                    
                    // 获取健康状态
                    const statusRes = await api.get('/health/status');
                    setStatusData(statusRes.data);
                    
                    // 获取健康指标
                    const metricsRes = await api.get('/health/metrics');
                    setMetricsData(metricsRes.data);
                } catch (error) {
                    console.error('获取健康数据失败:', error);
                } finally {
                    setLoading(false);
                }
            };
            
            useEffect(() => {
                refreshData();
            }, []);
            
            const getStatusColor = (status) => {
                switch (status) {
                    case 'healthy': return '#52c41a';
                    case 'warning': return '#faad14';
                    case 'error': return '#ff4d4f';
                    default: return '#1890ff';
                }
            };
            
            return (
                <div className="content">
                    <h1 style={{ marginBottom: '24px' }}>系统健康监控</h1>
                    
                    {/* 系统状态 */}
                    <Card title="系统状态" className="card">
                        <Row gutter={16}>
                            <Col span={8}>
                                <Button type="primary" onClick={refreshData} loading={loading}>
                                    刷新数据
                                </Button>
                            </Col>
                        </Row>
                        
                        {statusData && (
                            <Row style={{ marginTop: '24px' }} gutter={16}>
                                <Col span={8}>
                                    <Card size="small" title="系统状态">
                                        <Statistic 
                                            value={statusData.status === 'healthy' ? '正常' : '异常'}
                                            valueStyle={{ color: getStatusColor(statusData.status) }}
                                        />
                                    </Card>
                                </Col>
                                <Col span={8}>
                                    <Card size="small" title="运行时间">
                                        <Statistic 
                                            value={Math.round(statusData.uptime / 3600)} 
                                            suffix="小时"
                                        />
                                    </Card>
                                </Col>
                                <Col span={8}>
                                    <Card size="small" title="时间戳">
                                        <Statistic 
                                            value={new Date(statusData.timestamp * 1000).toLocaleString()}
                                        />
                                    </Card>
                                </Col>
                            </Row>
                        )}
                    </Card>
                    
                    {/* 健康指标 */}
                    <Card title="健康指标" className="card">
                        {metricsData && (
                            <Row gutter={16}>
                                <Col span={6}>
                                    <Card size="small" title="CPU使用率">
                                        <Progress 
                                            percent={metricsData.cpu_usage * 100} 
                                            status={metricsData.cpu_usage > 0.8 ? 'exception' : metricsData.cpu_usage > 0.6 ? 'warning' : 'normal'}
                                        />
                                        <div style={{ marginTop: '8px', textAlign: 'right' }}>
                                            {Math.round(metricsData.cpu_usage * 100)}%
                                        </div>
                                    </Card>
                                </Col>
                                <Col span={6}>
                                    <Card size="small" title="内存使用率">
                                        <Progress 
                                            percent={metricsData.memory_usage * 100} 
                                            status={metricsData.memory_usage > 0.8 ? 'exception' : metricsData.memory_usage > 0.6 ? 'warning' : 'normal'}
                                        />
                                        <div style={{ marginTop: '8px', textAlign: 'right' }}>
                                            {Math.round(metricsData.memory_usage * 100)}%
                                        </div>
                                    </Card>
                                </Col>
                                <Col span={6}>
                                    <Card size="small" title="磁盘使用率">
                                        <Progress 
                                            percent={metricsData.disk_usage * 100} 
                                            status={metricsData.disk_usage > 0.8 ? 'exception' : metricsData.disk_usage > 0.6 ? 'warning' : 'normal'}
                                        />
                                        <div style={{ marginTop: '8px', textAlign: 'right' }}>
                                            {Math.round(metricsData.disk_usage * 100)}%
                                        </div>
                                    </Card>
                                </Col>
                                <Col span={6}>
                                    <Card size="small" title="API响应时间">
                                        <Statistic 
                                            value={metricsData.api_response_time * 1000} 
                                            precision={2} 
                                            suffix="ms"
                                            valueStyle={{ color: metricsData.api_response_time > 0.5 ? '#ff4d4f' : metricsData.api_response_time > 0.2 ? '#faad14' : '#52c41a' }}
                                        />
                                    </Card>
                                </Col>
                            </Row>
                        )}
                    </Card>
                </div>
            );
        }
        
        // 主应用
        function App() {
            return (
                <BrowserRouter>
                    <div className="app">
                        <div className="header">
                            量化交易仪表盘
                        </div>
                        <Routes>
                            <Route path="/" element={<Dashboard />} />
                            <Route path="/risk" element={<RiskMonitoring />} />
                            <Route path="/performance" element={<PerformanceAttribution />} />
                            <Route path="/portfolio" element={<PortfolioMonitoring />} />
                            <Route path="/health" element={<SystemHealth />} />
                        </Routes>
                    </div>
                </BrowserRouter>
            );
        }
        
        // 渲染应用
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
