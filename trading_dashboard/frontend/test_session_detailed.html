<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会话功能详细测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f0f2f5;
        }
        .test-section {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #40a9ff;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
        }
        .success {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #52c41a;
        }
        .error {
            background: #fff1f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
        }
        .info {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            color: #1890ff;
        }
    </style>
</head>
<body>
    <h1>会话功能详细测试</h1>
    
    <div class="test-section">
        <h2>1. 环境检查</h2>
        <button onclick="checkEnvironment()">检查环境</button>
        <div id="env-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. 会话存储测试</h2>
        <button onclick="testStorage()">测试存储</button>
        <div id="storage-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. 会话加载测试</h2>
        <button onclick="testLoad()">测试加载</button>
        <div id="load-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>4. 会话更新测试</h2>
        <select id="test-field">
            <option value="currentTab">当前标签页</option>
            <option value="currentSystemMode">系统模式</option>
            <option value="theme">主题</option>
            <option value="account">账户</option>
            <option value="portfolio">投资组合</option>
            <option value="sector">板块</option>
        </select>
        <input type="text" id="test-value" placeholder="输入测试值">
        <button onclick="testUpdate()">测试更新</button>
        <div id="update-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>5. 完整流程测试</h2>
        <button onclick="testCompleteFlow()">测试完整流程</button>
        <div id="flow-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>6. 实际应用测试</h2>
        <button onclick="testActualApp()">测试实际应用</button>
        <div id="app-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>7. 会话清除</h2>
        <button onclick="clearSession()">清除会话</button>
        <div id="clear-result" class="result"></div>
    </div>

    <script>
        // 会话管理系统（与主应用相同）
        const SessionManager = {
            STORAGE_KEY: 'quant_trading_session',
            
            init() {
                const session = this.getSession();
                if (!session) {
                    this.createSession();
                }
                this.loadSession();
                return session;
            },
            
            createSession() {
                const session = {
                    currentTab: 'dashboard',
                    currentSystemMode: 'ours',
                    theme: 'default',
                    account: 'account1',
                    portfolio: 'portfolio1',
                    sector: 'all',
                    lastActive: new Date().toISOString()
                };
                this.saveSession(session);
                return session;
            },
            
            saveSession(session) {
                try {
                    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(session));
                    return true;
                } catch (e) {
                    console.error('Failed to save session:', e);
                    return false;
                }
            },
            
            getSession() {
                try {
                    const sessionData = localStorage.getItem(this.STORAGE_KEY);
                    return sessionData ? JSON.parse(sessionData) : null;
                } catch (e) {
                    console.error('Failed to get session:', e);
                    return null;
                }
            },
            
            updateSession(key, value) {
                const session = this.getSession() || this.createSession();
                session[key] = value;
                session.lastActive = new Date().toISOString();
                return this.saveSession(session);
            },
            
            deleteSession() {
                try {
                    localStorage.removeItem(this.STORAGE_KEY);
                    return true;
                } catch (e) {
                    console.error('Failed to delete session:', e);
                    return false;
                }
            },
            
            loadSession() {
                const session = this.getSession();
                if (session) {
                    console.log('Loaded session:', session);
                }
            }
        };
        
        function checkEnvironment() {
            const result = document.getElementById('env-result');
            const hasLocalStorage = typeof(Storage) !== 'undefined';
            const session = SessionManager.getSession();
            
            let html = '';
            if (hasLocalStorage) {
                html += '<div class="success"><strong>✓</strong> localStorage 可用</div>';
            } else {
                html += '<div class="error"><strong>✗</strong> localStorage 不可用</div>';
            }
            
            if (session) {
                html += '<div class="info"><strong>✓</strong> 会话已存在</div>';
                html += '<div>会话内容: ' + JSON.stringify(session, null, 2) + '</div>';
            } else {
                html += '<div class="info"><strong>ℹ</strong> 会话不存在，将创建新会话</div>';
            }
            
            result.innerHTML = html;
        }
        
        function testStorage() {
            const result = document.getElementById('storage-result');
            const session = SessionManager.createSession();
            
            if (session) {
                const storedSession = SessionManager.getSession();
                if (storedSession) {
                    result.innerHTML = '<div class="success"><strong>✓</strong> 会话存储成功</div>' +
                        '<div>存储的会话: ' + JSON.stringify(storedSession, null, 2) + '</div>';
                } else {
                    result.innerHTML = '<div class="error"><strong>✗</strong> 会话存储失败</div>';
                }
            } else {
                result.innerHTML = '<div class="error"><strong>✗</strong> 会话创建失败</div>';
            }
        }
        
        function testLoad() {
            const result = document.getElementById('load-result');
            const session = SessionManager.getSession();
            
            if (session) {
                result.innerHTML = '<div class="success"><strong>✓</strong> 会话加载成功</div>' +
                    '<div>加载的会话: ' + JSON.stringify(session, null, 2) + '</div>';
            } else {
                result.innerHTML = '<div class="error"><strong>✗</strong> 会话加载失败</div>';
            }
        }
        
        function testUpdate() {
            const field = document.getElementById('test-field').value;
            const value = document.getElementById('test-value').value;
            const result = document.getElementById('update-result');
            
            if (!value) {
                result.innerHTML = '<div class="error"><strong>✗</strong> 请输入测试值</div>';
                return;
            }
            
            const success = SessionManager.updateSession(field, value);
            if (success) {
                const session = SessionManager.getSession();
                result.innerHTML = '<div class="success"><strong>✓</strong> 会话更新成功</div>' +
                    '<div>更新后会话: ' + JSON.stringify(session, null, 2) + '</div>';
            } else {
                result.innerHTML = '<div class="error"><strong>✗</strong> 会话更新失败</div>';
            }
        }
        
        function testCompleteFlow() {
            const result = document.getElementById('flow-result');
            let html = '';
            let success = true;
            
            // 1. 创建会话
            const session1 = SessionManager.createSession();
            if (!session1) {
                html += '<div class="error"><strong>✗</strong> 步骤1: 会话创建失败</div>';
                success = false;
            } else {
                html += '<div class="success"><strong>✓</strong> 步骤1: 会话创建成功</div>';
            }
            
            // 2. 更新会话
            const updateSuccess = SessionManager.updateSession('testField', 'testValue');
            if (!updateSuccess) {
                html += '<div class="error"><strong>✗</strong> 步骤2: 会话更新失败</div>';
                success = false;
            } else {
                html += '<div class="success"><strong>✓</strong> 步骤2: 会话更新成功</div>';
            }
            
            // 3. 加载会话
            const session2 = SessionManager.getSession();
            if (!session2 || session2.testField !== 'testValue') {
                html += '<div class="error"><strong>✗</strong> 步骤3: 会话加载失败</div>';
                success = false;
            } else {
                html += '<div class="success"><strong>✓</strong> 步骤3: 会话加载成功</div>';
            }
            
            // 4. 验证会话内容
            if (session2) {
                html += '<div class="info">最终会话: ' + JSON.stringify(session2, null, 2) + '</div>';
            }
            
            if (success) {
                html += '<div class="success"><strong>✓</strong> 完整流程测试通过</div>';
            } else {
                html += '<div class="error"><strong>✗</strong> 完整流程测试失败</div>';
            }
            
            result.innerHTML = html;
        }
        
        function testActualApp() {
            const result = document.getElementById('app-result');
            
            // 模拟实际应用场景
            const testData = {
                currentTab: 'market',
                currentSystemMode: 'westkuanke',
                theme: 'eye-care',
                account: 'account2',
                portfolio: 'portfolio2',
                sector: 'technology'
            };
            
            // 更新所有字段
            let success = true;
            for (const [key, value] of Object.entries(testData)) {
                if (!SessionManager.updateSession(key, value)) {
                    success = false;
                    break;
                }
            }
            
            if (success) {
                const session = SessionManager.getSession();
                let allMatch = true;
                for (const [key, value] of Object.entries(testData)) {
                    if (session[key] !== value) {
                        allMatch = false;
                        break;
                    }
                }
                
                if (allMatch) {
                    result.innerHTML = '<div class="success"><strong>✓</strong> 实际应用测试通过</div>' +
                        '<div>测试数据: ' + JSON.stringify(testData, null, 2) + '</div>' +
                        '<div>实际会话: ' + JSON.stringify(session, null, 2) + '</div>';
                } else {
                    result.innerHTML = '<div class="error"><strong>✗</strong> 实际应用测试失败: 数据不匹配</div>' +
                        '<div>测试数据: ' + JSON.stringify(testData, null, 2) + '</div>' +
                        '<div>实际会话: ' + JSON.stringify(session, null, 2) + '</div>';
                }
            } else {
                result.innerHTML = '<div class="error"><strong>✗</strong> 实际应用测试失败: 更新失败</div>';
            }
        }
        
        function clearSession() {
            const result = document.getElementById('clear-result');
            const success = SessionManager.deleteSession();
            
            if (success) {
                result.innerHTML = '<div class="success"><strong>✓</strong> 会话清除成功</div>';
            } else {
                result.innerHTML = '<div class="error"><strong>✗</strong> 会话清除失败</div>';
            }
        }
        
        // 页面加载时初始化
        window.onload = function() {
            console.log('会话测试页面加载完成');
            checkEnvironment();
        };
    </script>
</body>
</html>
