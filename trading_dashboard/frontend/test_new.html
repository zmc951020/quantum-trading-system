<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试</title>
    <style>
        .nav { margin-bottom: 20px; }
        .nav-item { padding: 10px; cursor: pointer; border: 1px solid #ccc; display: inline-block; }
        .nav-item.active { background: #1890ff; color: white; }
        .tab { display: none; padding: 20px; border: 1px solid #ccc; }
        .tab.active { display: block; }
    </style>
</head>
<body>
    <h1>模块切换测试</h1>
    
    <div class="nav">
        <div class="nav-item active" onclick="switchTab('tab1')">标签1</div>
        <div class="nav-item" onclick="switchTab('tab2')">标签2</div>
        <div class="nav-item" onclick="switchTab('tab3')">标签3</div>
    </div>
    
    <div class="tab active" id="tab1">
        <h2>标签1内容</h2>
        <p>这是标签1的内容</p>
    </div>
    
    <div class="tab" id="tab2">
        <h2>标签2内容</h2>
        <p>这是标签2的内容</p>
    </div>
    
    <div class="tab" id="tab3">
        <h2>标签3内容</h2>
        <p>这是标签3的内容</p>
    </div>

    <script>
    function switchTab(tabId) {
        console.log('switchTab called with:', tabId);
        
        var tabs = document.querySelectorAll('.tab');
        for (var i = 0; i < tabs.length; i++) {
            tabs[i].style.display = 'none';
            tabs[i].classList.remove('active');
        }
        
        var targetTab = document.getElementById(tabId);
        if (targetTab) {
            targetTab.style.display = 'block';
            targetTab.classList.add('active');
        }
        
        var navItems = document.querySelectorAll('.nav-item');
        for (var j = 0; j < navItems.length; j++) {
            navItems[j].classList.remove('active');
        }
        
        var tabNames = {
            'tab1': '标签1',
            'tab2': '标签2',
            'tab3': '标签3'
        };
        
        var targetName = tabNames[tabId];
        for (var k = 0; k < navItems.length; k++) {
            if (navItems[k].textContent === targetName) {
                navItems[k].classList.add('active');
                break;
            }
        }
    }
    
    console.log('Script loaded');
    </script>
</body>
</html>
