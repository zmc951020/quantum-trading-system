<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单模块切换测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f0f2f5;
        }
        .nav {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #e8e8e8;
        }
        .nav-item {
            padding: 10px 20px;
            cursor: pointer;
            border: 1px solid #e8e8e8;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            margin-right: 5px;
        }
        .nav-item.active {
            background-color: #1890ff;
            color: white;
        }
        .tab-content {
            display: none;
            padding: 20px;
            border: 1px solid #e8e8e8;
            border-radius: 0 4px 4px 4px;
            background-color: white;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <h1>简单模块切换测试</h1>
    
    <!-- 导航 -->
    <div class="nav">
        <div class="nav-item active" onclick="showTab('dashboard', event)">仪表盘</div>
        <div class="nav-item" onclick="showTab('market', event)">市场监控</div>
        <div class="nav-item" onclick="showTab('portfolio', event)">投资组合</div>
    </div>
    
    <!-- 内容区域 -->
    <div class="tab-content active" id="dashboard-tab">
        <h2>仪表盘</h2>
        <p>仪表盘内容</p>
    </div>
    
    <div class="tab-content" id="market-tab">
        <h2>市场监控</h2>
        <p>市场监控内容</p>
    </div>
    
    <div class="tab-content" id="portfolio-tab">
        <h2>投资组合</h2>
        <p>投资组合内容</p>
    </div>

    <script>
        // 简单的showTab函数
        function showTab(tabId, event) {
            console.log('调用showTab函数，tabId:', tabId);
            
            // 隐藏所有标签页
            const allTabs = document.querySelectorAll('.tab-content');
            console.log('找到的标签页数量:', allTabs.length);
            allTabs.forEach(tab => {
                tab.classList.remove('active');
                console.log('隐藏标签页:', tab.id);
            });
            
            // 显示选中的标签页
            const selectedTab = document.getElementById(tabId + '-tab');
            if (selectedTab) {
                selectedTab.classList.add('active');
                console.log('显示标签页:', selectedTab.id);
            } else {
                console.log('未找到标签页:', tabId + '-tab');
            }
            
            // 更新导航项激活状态
            const navItems = document.querySelectorAll('.nav-item');
            console.log('找到的导航项数量:', navItems.length);
            navItems.forEach(item => {
                item.classList.remove('active');
                console.log('移除导航项激活状态:', item.textContent);
            });
            
            // 激活当前导航项
            if (event) {
                let target = event.target;
                while (target && !target.classList.contains('nav-item')) {
                    target = target.parentElement;
                }
                if (target) {
                    target.classList.add('active');
                    console.log('激活导航项:', target.textContent);
                }
            } else {
                // 如果没有event参数，根据tabId找到对应的导航项
                const navItems = document.querySelectorAll('.nav-item');
                for (const item of navItems) {
                    const text = item.textContent.trim();
                    const tabMapping = {
                        '仪表盘': 'dashboard',
                        '市场监控': 'market',
                        '投资组合': 'portfolio'
                    };
                    if (tabMapping[text] === tabId) {
                        item.classList.add('active');
                        console.log('激活导航项:', text);
                        break;
                    }
                }
            }
        }
        
        // 初始化
        console.log('页面加载完成');
    </script>
</body>
</html>
