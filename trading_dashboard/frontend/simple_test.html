<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单模块切换测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f0f2f5;
        }
        .nav {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #e8e8e8;
        }
        .nav-item {
            padding: 10px 20px;
            cursor: pointer;
            border: 1px solid #e8e8e8;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            margin-right: 5px;
        }
        .nav-item.active {
            background-color: #1890ff;
            color: white;
        }
        .tab-content {
            display: none;
            padding: 20px;
            border: 1px solid #e8e8e8;
            border-radius: 0 4px 4px 4px;
            background-color: white;
        }
        .tab-content.active {
            display: block;
        }
        .test-result {
            margin-top: 20px;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>简单模块切换测试</h1>
    
    <!-- 导航 -->
    <div class="nav">
        <div class="nav-item active" onclick="showTab('dashboard', event)">仪表盘</div>
        <div class="nav-item" onclick="showTab('market', event)">市场监控</div>
        <div class="nav-item" onclick="showTab('portfolio', event)">投资组合</div>
        <div class="nav-item" onclick="showTab('technical', event)">技术分析</div>
    </div>
    
    <!-- 内容区域 -->
    <div class="tab-content active" id="dashboard-tab">
        <h2>仪表盘</h2>
        <p>仪表盘内容</p>
    </div>
    
    <div class="tab-content" id="market-tab">
        <h2>市场监控</h2>
        <p>市场监控内容</p>
    </div>
    
    <div class="tab-content" id="portfolio-tab">
        <h2>投资组合</h2>
        <p>投资组合内容</p>
    </div>
    
    <div class="tab-content" id="technical-tab">
        <h2>技术分析</h2>
        <p>技术分析内容</p>
    </div>
    
    <!-- 测试结果 -->
    <div class="test-result" id="test-result">
        <h3>测试结果</h3>
        <div id="result-content">点击导航标签页测试模块切换功能</div>
    </div>

    <script>
        // 简单的showTab函数
        function showTab(tabId, event) {
            // 隐藏所有标签页
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 显示选中的标签页
            const tab = document.getElementById(tabId + '-tab');
            if (tab) {
                tab.classList.add('active');
            }
            
            // 更新导航项激活状态
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            
            // 激活当前导航项
            if (event) {
                let target = event.target;
                while (target && !target.classList.contains('nav-item')) {
                    target = target.parentElement;
                }
                if (target) {
                    target.classList.add('active');
                }
            }
            
            // 更新测试结果
            const resultContent = document.getElementById('result-content');
            resultContent.innerHTML = `成功切换到 ${tabId} 模块`;
            resultContent.style.color = 'green';
        }
        
        // 初始化
        console.log('页面加载完成，测试模块切换功能');
    </script>
</body>
</html>
