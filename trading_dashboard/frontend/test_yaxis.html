<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试页面</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <h1>测试页面</h1>
    
    <div id="test-chart" style="width: 600px; height: 400px;"></div>

    <script>
    function calculateChartRange(values) {
        const maxValue = Math.max(...values);
        const minValue = Math.min(...values);
        let yAxisMin, yAxisMax, interval;
        
        if (maxValue > 950 && minValue < 1050) {
            yAxisMin = 950;
            yAxisMax = 1050;
            interval = 10;
        } else if (maxValue > 750 && minValue < 850) {
            yAxisMin = 750;
            yAxisMax = 850;
            interval = 10;
        } else {
            const range = maxValue - minValue;
            yAxisMin = minValue - range * 0.1;
            yAxisMax = maxValue + range * 0.1;
            interval = (yAxisMax - yAxisMin) / 10;
        }
        
        return { yAxisMin, yAxisMax, interval };
    }
    
    function generateChartData(baseValue, days, volatility, trendFactor) {
        const values = [];
        let currentValue = baseValue;
        
        for (let i = 0; i < days; i++) {
            const change = (Math.random() - 0.5) * 2 * volatility + trendFactor;
            currentValue += change;
            values.push(currentValue);
        }
        
        return { values: values };
    }
    
    function loadTechnicalData() {
        const priceData = generateChartData(150, 30, 10, 1).values;
        const indicatorData = generateChartData(148, 30, 8, 1).values;
        const allData = [...priceData, ...indicatorData];
        
        const { yAxisMin, yAxisMax, interval } = calculateChartRange(allData);
        console.log('yAxisMin:', yAxisMin);
        
        const chart = echarts.init(document.getElementById('test-chart'));
        const option = {
            title: {
                text: '测试图表'
            },
            xAxis: {
                type: 'category',
                data: Array.from({ length: 30 }, (_, i) => i + 1)
            },
            yAxis: {
                type: 'value',
                min: yAxisMin,
                max: yAxisMax,
                interval: interval
            },
            series: [{
                data: priceData,
                type: 'line'
            }]
        };
        chart.setOption(option);
    }
    
    console.log('Script loaded');
    loadTechnicalData();
    </script>
</body>
</html>
