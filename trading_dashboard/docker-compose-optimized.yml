version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: trading-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: trading-frontend
    networks:
      - internal
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    volumes:
      - frontend_data:/app/data
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: trading-backend
    env_file:
      - ./backend.env
    networks:
      - internal
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    volumes:
      - backend_data:/app/data
    deploy:
      resources:
        limits:
          cpus: '2.00'
          memory: 2G

volumes:
  backend_data:
    name: trading_backend_data
  backend_logs:
    name: trading_backend_logs
  frontend_data:
    name: trading_frontend_data
  nginx_logs:
    name: trading_nginx_logs

networks:
  internal:
    driver: bridge
    name: trading_internal_network
