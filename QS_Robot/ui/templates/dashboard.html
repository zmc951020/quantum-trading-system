<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QS Robot - 系统导航</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="logo-icon">🤖</span>
                <span class="logo-text">QS Robot</span>
            </div>
            <div class="nav-menu">
                <a href="/dashboard" class="nav-link active">🏠 首页</a>
                <a href="/" class="nav-link">🤖 智能助手</a>
                <a href="/stock_pool" class="nav-link">📊 股票池</a>
                <a href="#" class="nav-link disabled">📈 技术分析</a>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">
        <div class="hero">
            <h1>量化交易工作台</h1>
            <p>一站式的量化分析与智能决策平台</p>
        </div>

        <div class="modules-grid">
            <!-- QS Robot 智能助手 -->
            <div class="module-card" onclick="window.location.href='/'">
                <div class="module-icon robot">🤖</div>
                <div class="module-title">QS Robot 智能助手</div>
                <div class="module-desc">通过自然语言对话查询系统状态、优化策略参数、进行回测分析</div>
                <div class="module-status online">
                    <span class="status-dot"></span>
                    <span>运行中</span>
                </div>
                <button class="module-btn">进入 →</button>
            </div>

            <!-- 股票池智能管理 -->
            <div class="module-card" onclick="window.location.href='/stock_pool'">
                <div class="module-icon stock-pool">📊</div>
                <div class="module-title">股票池智能管理</div>
                <div class="module-desc">智能筛选、策略匹配、预实盘模拟、专家投票、综合评分</div>
                <div class="module-status online">
                    <span class="status-dot"></span>
                    <span>运行中</span>
                </div>
                <button class="module-btn">进入 →</button>
            </div>

            <!-- 技术分析系统（待开发） -->
            <div class="module-card disabled">
                <div class="module-icon analysis">📈</div>
                <div class="module-title">技术分析系统</div>
                <div class="module-desc">K线图、技术指标、图表分析、形态识别（即将上线）</div>
                <div class="module-status coming">
                    <span class="status-dot"></span>
                    <span>待开发</span>
                </div>
                <button class="module-btn disabled">敬请期待</button>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>QS Robot © 2024 - Aurora量化交易系统神经中枢</p>
    </footer>
</body>
</html>
