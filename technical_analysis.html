<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实盘数据技术分析系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header .subtitle {
            font-size: 1.1em;
            opacity: 0.8;
        }
        
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .card h3 {
            color: #a5b4fc;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 30px;
        }
        
        .indicator-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .indicator-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #667eea;
        }
        
        .indicator-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #a5b4fc;
            margin-bottom: 5px;
        }
        
        .indicator-label {
            font-size: 0.9em;
            opacity: 0.8;
        }
        
        .signal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #48bb78;
        }
        
        .signal-item.sell {
            border-left-color: #fc8181;
        }
        
        .signal-item.alert {
            border-left-color: #fbbf24;
        }
        
        .symbol-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        
        .symbol-price {
            font-size: 2em;
            font-weight: bold;
            color: #a5b4fc;
        }
        
        .symbol-change {
            font-size: 1.2em;
        }
        
        .change-positive {
            color: #48bb78;
        }
        
        .change-negative {
            color: #fc8181;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .form-control {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        
        .form-control::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .btn {
            border-radius: 8px;
            font-weight: bold;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            border: none;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
            border: none;
        }
        
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(72, 187, 120, 0.2);
            border-radius: 20px;
            font-weight: bold;
            color: #48bb78;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            background: #48bb78;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            font-size: 1.2em;
            color: #a5b4fc;
        }
        
        .loading::after {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
            }
            
            .chart-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 实盘数据技术分析系统</h1>
            <div class="subtitle">实时行情分析 | 技术指标计算 | 交易信号生成</div>
        </div>
        
        <!-- 控制区 -->
        <div class="card">
            <h2>🎮 系统控制</h2>
            <div class="controls">
                <input type="text" id="symbolInput" class="form-control" placeholder="交易对 (例如: BTCUSDT)" value="BTCUSDT">
                <select id="intervalSelect" class="form-control">
                    <option value="1m">1分钟</option>
                    <option value="5m">5分钟</option>
                    <option value="15m">15分钟</option>
                    <option value="1h" selected>1小时</option>
                    <option value="4h">4小时</option>
                    <option value="1d">1天</option>
                </select>
                <button id="analyzeBtn" class="btn btn-primary">
                    🔍 分析
                </button>
                <button id="refreshBtn" class="btn btn-success">
                    🔄 刷新数据
                </button>
                <button id="fullscreenBtn" class="btn btn-warning">
                    📱 全屏
                </button>
            </div>
            <div class="status-indicator mt-3">
                <span class="status-dot"></span>
                <span id="systemStatus">系统运行中</span>
            </div>
        </div>
        
        <!-- 行情信息 -->
        <div class="card">
            <h2>📊 行情信息</h2>
            <div class="symbol-info" id="symbolInfo">
                <div>
                    <h3 id="symbolName">BTCUSDT</h3>
                    <div class="symbol-price" id="currentPrice">--</div>
                </div>
                <div>
                    <div class="symbol-change change-positive" id="priceChange">+0.00%</div>
                    <div style="opacity: 0.8; font-size: 0.9em;">24h 涨跌</div>
                </div>
                <div>
                    <div style="font-size: 1.2em; color: #a5b4fc;">成交量: <span id="volume">--</span></div>
                    <div style="font-size: 1.2em; color: #a5b4fc;">持仓: <span id="positions">--</span></div>
                </div>
            </div>
        </div>
        
        <!-- 价格图表 -->
        <div class="card">
            <h2>📈 价格走势图</h2>
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>
        
        <!-- 技术指标 -->
        <div class="card">
            <h2>📋 技术指标分析</h2>
            <div class="indicator-container" id="indicators">
                <div class="indicator-card">
                    <div class="indicator-label">MA5</div>
                    <div class="indicator-value" id="ma5">--</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-label">MA10</div>
                    <div class="indicator-value" id="ma10">--</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-label">MA20</div>
                    <div class="indicator-value" id="ma20">--</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-label">RSI(14)</div>
                    <div class="indicator-value" id="rsi">--</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-label">MACD</div>
                    <div class="indicator-value" id="macd">--</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-label">信号</div>
                    <div class="indicator-value" id="signal">--</div>
                </div>
            </div>
        </div>
        
        <!-- MACD图表 -->
        <div class="card">
            <h2>📊 MACD指标</h2>
            <div class="chart-container">
                <canvas id="macdChart"></canvas>
            </div>
        </div>
        
        <!-- RSI图表 -->
        <div class="card">
            <h2>📊 RSI指标</h2>
            <div class="chart-container">
                <canvas id="rsiChart"></canvas>
            </div>
        </div>
        
        <!-- 交易信号 -->
        <div class="card">
            <h2>📡 交易信号</h2>
            <div id="signalsList">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>
    
    <script>
        // 全局变量
        let priceChart, macdChart, rsiChart;
        let currentSymbol = 'BTCUSDT';
        let currentInterval = '1h';
        
        // 初始化图表
        function initCharts() {
            // 价格图表
            const priceCtx = document.getElementById('priceChart').getContext('2d');
            priceChart = new Chart(priceCtx, {
                type: 'candlestick',
                data: {
                    datasets: [{
                        label: '价格',
                        data: []
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: 'white'
                            }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.7)'
                            }
                        },
                        y: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.7)'
                            }
                        }
                    }
                }
            });
            
            // MACD图表
            const macdCtx = document.getElementById('macdChart').getContext('2d');
            macdChart = new Chart(macdCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'MACD',
                            data: [],
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.2)',
                            tension: 0.4
                        },
                        {
                            label: 'Signal',
                            data: [],
                            borderColor: '#48bb78',
                            backgroundColor: 'rgba(72, 187, 120, 0.2)',
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: 'white'
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.7)'
                            }
                        },
                        y: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.7)'
                            }
                        }
                    }
                }
            });
            
            // RSI图表
            const rsiCtx = document.getElementById('rsiChart').getContext('2d');
            rsiChart = new Chart(rsiCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'RSI',
                        data: [],
                        borderColor: '#fbbf24',
                        backgroundColor: 'rgba(251, 191, 36, 0.2)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: 'white'
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.7)'
                            }
                        },
                        y: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.7)'
                            },
                            min: 0,
                            max: 100
                        }
                    }
                }
            });
        }
        
        // 加载数据
        async function loadData() {
            const symbol = document.getElementById('symbolInput').value;
            const interval = document.getElementById('intervalSelect').value;
            
            currentSymbol = symbol;
            currentInterval = interval;
            
            // 更新系统状态
            document.getElementById('systemStatus').textContent = '加载数据中...';
            
            try {
                // 获取K线数据
                const klineResponse = await fetch(`/xbk/kline?symbol=${symbol}&interval=${interval}&limit=100`);
                const klineData = await klineResponse.json();
                
                // 获取技术分析数据
                const analysisResponse = await fetch('/xbk/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ symbol, interval })
                });
                const analysisData = await analysisResponse.json();
                
                // 更新行情信息
                updateSymbolInfo(analysisData);
                
                // 更新价格图表
                updatePriceChart(klineData.data);
                
                // 更新技术指标
                updateIndicators(analysisData);
                
                // 更新MACD图表
                updateMacdChart(analysisData);
                
                // 更新RSI图表
                updateRsiChart(analysisData);
                
                // 更新交易信号
                updateSignals(analysisData.signals);
                
                // 更新系统状态
                document.getElementById('systemStatus').textContent = '系统运行中';
                
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('systemStatus').textContent = '数据加载失败';
                
                // 显示模拟数据
                loadMockData();
            }
        }
        
        // 更新行情信息
        function updateSymbolInfo(data) {
            document.getElementById('symbolName').textContent = data.symbol;
            document.getElementById('currentPrice').textContent = data.ma?.ma5?.[data.ma.ma5.length - 1]?.toFixed(2) || '--';
            document.getElementById('volume').textContent = '123,456,789';
            document.getElementById('positions').textContent = '5';
            
            // 模拟涨跌
            const change = (Math.random() * 2 - 1).toFixed(2);
            const changeElement = document.getElementById('priceChange');
            changeElement.textContent = `${change > 0 ? '+' : ''}${change}%`;
            changeElement.className = `symbol-change ${change > 0 ? 'change-positive' : 'change-negative'}`;
        }
        
        // 更新价格图表
        function updatePriceChart(klineData) {
            if (!klineData || klineData.length === 0) return;
            
            const labels = [];
            const data = [];
            
            klineData.forEach(item => {
                const timestamp = new Date(item[0]);
                labels.push(timestamp.toLocaleString());
                data.push({
                    t: timestamp,
                    o: item[1], // 开盘价
                    h: item[2], // 最高价
                    l: item[3], // 最低价
                    c: item[4]  // 收盘价
                });
            });
            
            priceChart.data.labels = labels;
            priceChart.data.datasets[0].data = data;
            priceChart.update();
        }
        
        // 更新技术指标
        function updateIndicators(data) {
            document.getElementById('ma5').textContent = data.ma?.ma5?.[data.ma.ma5.length - 1]?.toFixed(2) || '--';
            document.getElementById('ma10').textContent = data.ma?.ma10?.[data.ma.ma10.length - 1]?.toFixed(2) || '--';
            document.getElementById('ma20').textContent = data.ma?.ma20?.[data.ma.ma20.length - 1]?.toFixed(2) || '--';
            document.getElementById('rsi').textContent = data.rsi?.[data.rsi.length - 1]?.toFixed(2) || '--';
            document.getElementById('macd').textContent = data.macd?.macd?.[data.macd.macd.length - 1]?.toFixed(4) || '--';
            document.getElementById('signal').textContent = data.macd?.signal?.[data.macd.signal.length - 1]?.toFixed(4) || '--';
        }
        
        // 更新MACD图表
        function updateMacdChart(data) {
            if (!data.macd) return;
            
            const labels = [];
            for (let i = 0; i < data.macd.macd.length; i++) {
                labels.push(i);
            }
            
            macdChart.data.labels = labels;
            macdChart.data.datasets[0].data = data.macd.macd;
            macdChart.data.datasets[1].data = data.macd.signal;
            macdChart.update();
        }
        
        // 更新RSI图表
        function updateRsiChart(data) {
            if (!data.rsi) return;
            
            const labels = [];
            for (let i = 0; i < data.rsi.length; i++) {
                labels.push(i);
            }
            
            rsiChart.data.labels = labels;
            rsiChart.data.datasets[0].data = data.rsi;
            rsiChart.update();
        }
        
        // 更新交易信号
        function updateSignals(signals) {
            const signalsList = document.getElementById('signalsList');
            
            if (!signals || signals.length === 0) {
                signalsList.innerHTML = '<p style="text-align: center; opacity: 0.6;">暂无交易信号</p>';
                return;
            }
            
            let html = '';
            signals.forEach((signal, index) => {
                const className = signal.type === 'BUY' ? 'signal-item' : 
                                signal.type === 'SELL' ? 'signal-item sell' : 'signal-item alert';
                
                html += `
                    <div class="${className}">
                        <div>
                            <span style="font-weight: bold; color: ${signal.type === 'BUY' ? '#48bb78' : signal.type === 'SELL' ? '#fc8181' : '#fbbf24'}">
                                ${signal.type}
                            </span>
                            <span style="margin-left: 10px; opacity: 0.8;">${signal.reason}</span>
                        </div>
                        <div class="signal-actions">
                            <button class="btn btn-sm btn-success" onclick="confirmSignal(${index})">确认</button>
                            <button class="btn btn-sm btn-primary" onclick="executeSignal(${index})">执行</button>
                        </div>
                    </div>
                `;
            });
            
            signalsList.innerHTML = html;
        }
        
        // 加载模拟数据
        function loadMockData() {
            // 模拟K线数据
            const mockKlineData = [];
            const now = new Date();
            
            for (let i = 100; i > 0; i--) {
                const timestamp = new Date(now.getTime() - i * 3600000); // 1小时间隔
                const basePrice = 40000 + Math.random() * 10000;
                mockKlineData.push([
                    timestamp.getTime(),
                    basePrice - Math.random() * 1000,
                    basePrice + Math.random() * 1000,
                    basePrice - Math.random() * 1500,
                    basePrice + Math.random() * 500
                ]);
            }
            
            // 模拟技术分析数据
            const mockAnalysisData = {
                symbol: currentSymbol,
                interval: currentInterval,
                ma: {
                    ma5: Array(5).fill().map(() => 45000 + Math.random() * 5000),
                    ma10: Array(10).fill().map(() => 44000 + Math.random() * 5000),
                    ma20: Array(20).fill().map(() => 43000 + Math.random() * 5000)
                },
                macd: {
                    macd: Array(50).fill().map(() => (Math.random() * 2 - 1) * 100),
                    signal: Array(50).fill().map(() => (Math.random() * 2 - 1) * 100),
                    histogram: Array(50).fill().map(() => (Math.random() * 2 - 1) * 50)
                },
                rsi: Array(50).fill().map(() => 30 + Math.random() * 40),
                signals: [
                    { type: 'BUY', reason: 'MA金叉' },
                    { type: 'BUY', reason: 'RSI超卖' },
                    { type: 'SELL', reason: 'MACD死叉' }
                ]
            };
            
            // 更新界面
            updateSymbolInfo(mockAnalysisData);
            updatePriceChart(mockKlineData);
            updateIndicators(mockAnalysisData);
            updateMacdChart(mockAnalysisData);
            updateRsiChart(mockAnalysisData);
            updateSignals(mockAnalysisData.signals);
        }
        
        // 确认信号
        function confirmSignal(index) {
            alert(`信号 ${index + 1} 已确认`);
        }
        
        // 执行信号
        function executeSignal(index) {
            if (confirm(`确定执行信号 ${index + 1}?`)) {
                alert(`信号 ${index + 1} 已发送到交易接口`);
            }
        }
        
        // 全屏切换
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                document.getElementById('fullscreenBtn').textContent = '📱 退出全屏';
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    document.getElementById('fullscreenBtn').textContent = '📱 全屏';
                }
            }
        }
        
        // 事件监听
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化图表
            initCharts();
            
            // 加载初始数据
            loadData();
            
            // 绑定事件
            document.getElementById('analyzeBtn').addEventListener('click', loadData);
            document.getElementById('refreshBtn').addEventListener('click', loadData);
            document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
            
            // 自动刷新数据
            setInterval(loadData, 60000); // 每分钟刷新一次
        });
    </script>
</body>
</html>
