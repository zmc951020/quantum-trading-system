<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Aurora ML仪表板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios@1.6/dist/axios.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Microsoft YaHei',sans-serif;background:#0a0e27;color:#e0e6ed;padding:15px}
.header{background:linear-gradient(135deg,#1a1f3a,#0d1128);padding:12px 20px;border-radius:8px;border:1px solid #1e2a4a;margin-bottom:15px}
.header h1{font-size:20px;background:linear-gradient(90deg,#4fc3f7,#29b6f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.row{display:flex;gap:15px;margin-bottom:15px;flex-wrap:wrap}.card{background:#121636;border:1px solid #1e2a4a;border-radius:8px;padding:15px;flex:1;min-width:280px}
.card h3{color:#4fc3f7;font-size:14px;margin-bottom:10px;border-bottom:1px solid #1e2a4a;padding-bottom:8px}
.chart-box{width:100%;height:250px}.metric-row{display:flex;gap:10px;flex-wrap:wrap}
.metric{background:#1a2548;border-radius:6px;padding:10px 14px;text-align:center;min-width:100px}
.metric .value{font-size:22px;font-weight:bold;margin:5px 0}.metric .label{font-size:11px;color:#8899aa}
.positive{color:#00e676}.negative{color:#ff1744}.neutral{color:#ffab40}
.model-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a2548}
.model-row .name{font-size:13px}.model-row .status{font-size:11px;padding:2px 8px;border-radius:10px}
.status-loaded{background:#1b5e20;color:#66bb6a}.status-not_trained{background:#e65100;color:#ffb74d}
.status-registered{background:#1565c0;color:#90caf9}.status-error{background:#b71c1c;color:#ef5350}
.progress-bar{height:6px;background:#1e2a4a;border-radius:3px;overflow:hidden;margin:4px 0}
.progress-fill{height:100%;border-radius:3px;transition:width 0.5s}
.anomaly-alert{padding:10px;border-radius:6px;margin:8px 0;font-size:13px}
.anomaly-alert.normal{background:#1b5e2040;border:1px solid #1b5e20}.anomaly-alert.warning{background:#e6510040;border:1px solid #e65100}
.anomaly-alert.critical{background:#b71c1c40;border:1px solid #b71c1c}
.btn{padding:8px 16px;background:#1a2548;color:#e0e6ed;border:1px solid #2a3a6a;border-radius:4px;cursor:pointer;font-size:13px}.btn:hover{background:#2a3a6a;border-color:#4fc3f7}
</style></head>
<body>
<div class="header"><h1>🧠 Aurora ML 模型矩阵仪表板</h1></div>
<div class="row">
  <div class="card"><h3>📊 模型状态总览</h3><div id="modelStatusList"></div></div>
  <div class="card"><h3>🎯 模型权重分布</h3><div class="chart-box" id="weightChart"></div></div>
  <div class="card"><h3>📈 策略表现追踪</h3><div class="chart-box" id="perfChart"></div></div>
</div>
<div class="row">
  <div class="card"><h3>🔮 共识信号流</h3><div class="chart-box" id="signalChart"></div></div>
  <div class="card"><h3>⚠️ 异常检测监控</h3><div class="chart-box" id="anomalyChart"></div></div>
  <div class="card"><h3>🧬 自演进引擎</h3><div style="margin-top:5px" id="evolutionStatus"></div></div>
</div>
<div class="row">
  <div class="card"><h3>⚙️ 操作</h3>
    <button class="btn" onclick="refreshAll()">刷新全部</button>
    <button class="btn" onclick="trainAllModels()">训练所有模型</button>
    <button class="btn" onclick="evolveGeneration()">进化一代</button>
    <button class="btn" onclick="saveState()">保存状态</button>
  </div>
</div>
<script>
let charts={};
function initChart(id){const el=document.getElementById(id);if(!el)return;if(charts[id])charts[id].dispose();charts[id]=echarts.init(el);window.addEventListener('resize',()=>charts[id]?.resize())}
async function refreshAll(){
  initChart('weightChart');initChart('perfChart');initChart('signalChart');initChart('anomalyChart');
  loadModelStatus();loadWeights();loadPerformance();loadSignals();loadAnomaly();loadEvolution();
}
function loadModelStatus(){
  const html=['deep_ensemble','mamba','tft','rl','gp','anomaly'].map((n,i)=>{
    const s=['loaded','not_trained','registered','not_trained','loaded','loaded'][i];
    return `<div class="model-row"><span class="name">${n}</span><span class="status status-${s}">${s}</span></div>`;
  }).join('');
  document.getElementById('modelStatusList').innerHTML=html||'<p style="color:#8899aa">加载中...</p>';
}
function loadWeights(){
  if(!charts.weightChart)return;
  const data=[{value:28,name:'deep_ensemble'},{value:23,name:'mamba_ts'},{value:20,name:'tft'},{value:15,name:'rl'},{value:10,name:'gp'},{value:4,name:'anomaly'}];
  charts.weightChart.setOption({backgroundColor:'transparent',tooltip:{trigger:'item'},
    series:[{type:'pie',radius:['40%','70%'],avoidLabelOverlap:false,label:{show:false},
    emphasis:{label:{show:true,fontSize:14}},data}]});
}
function loadPerformance(){
  if(!charts.perfChart)return;
  const dates=[];const sharpe=[];const ret=[];
  for(let i=30;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);dates.push(d.toLocaleDateString());sharpe.push((1.5+Math.random()*1).toFixed(2));ret.push((5+Math.random()*8).toFixed(1))}
  charts.perfChart.setOption({backgroundColor:'transparent',tooltip:{trigger:'axis'},legend:{data:['夏普','收益%'],textStyle:{color:'#8899aa'},top:0},
    xAxis:{data:dates,axisLabel:{color:'#8899aa',fontSize:9},axisLine:{lineStyle:{color:'#1e2a4a'}}},
    yAxis:{axisLabel:{color:'#8899aa'},splitLine:{lineStyle:{color:'#1e2a4a',type:'dashed'}}},
    series:[{name:'夏普',type:'line',data:sharpe,smooth:true,lineStyle:{color:'#4fc3f7'},symbol:'none'},
            {name:'收益%',type:'line',data:ret,smooth:true,lineStyle:{color:'#00e676'},symbol:'none'}]});
}
function loadSignals(){
  if(!charts.signalChart)return;
  const cats=[];const buy=[];const hold=[];const sell=[];
  for(let i=20;i>=0;i--){cats.push(`T-${i}`);buy.push(Math.random()*0.8);hold.push(Math.random()*0.4);sell.push(Math.random()*0.6)}
  charts.signalChart.setOption({backgroundColor:'transparent',tooltip:{trigger:'axis'},legend:{data:['买入','持仓','卖出'],textStyle:{color:'#8899aa'},top:0},
    xAxis:{data:cats,axisLabel:{color:'#8899aa',fontSize:9},axisLine:{lineStyle:{color:'#1e2a4a'}}},
    yAxis:{max:1,axisLabel:{color:'#8899aa'},splitLine:{lineStyle:{color:'#1e2a4a',type:'dashed'}}},
    series:[{name:'买入',type:'bar',data:buy,itemStyle:{color:'#00e67680'},stack:'total'},
            {name:'持仓',type:'bar',data:hold,itemStyle:{color:'#ffab4080'},stack:'total'},
            {name:'卖出',type:'bar',data:sell,itemStyle:{color:'#ff174480'},stack:'total'}]});
}
function loadAnomaly(){
  if(!charts.anomalyChart)return;
  const vals=[];for(let i=50;i>=0;i--)vals.push(Math.random()*2);
  const threshold=1.0;
  charts.anomalyChart.setOption({backgroundColor:'transparent',tooltip:{trigger:'axis'},
    xAxis:{data:vals.map((_,i)=>i),axisLabel:{color:'#8899aa',fontSize:9},axisLine:{lineStyle:{color:'#1e2a4a'}}},
    yAxis:{axisLabel:{color:'#8899aa'},splitLine:{lineStyle:{color:'#1e2a4a',type:'dashed'}}},
    series:[{type:'line',data:vals,smooth:true,lineStyle:{color:'#ffab40'},symbol:'none',areaStyle:{color:'rgba(255,171,64,0.15)'}},
            {type:'line',data:Array(51).fill(threshold),lineStyle:{color:'#ff1744',type:'dashed',width:2},symbol:'none'}]});
}
function loadEvolution(){
  document.getElementById('evolutionStatus').innerHTML=`
    <div class="metric-row">
      <div class="metric"><div class="value">7</div><div class="label">当前代数</div></div>
      <div class="metric"><div class="value positive">48</div><div class="label">种群规模</div></div>
      <div class="metric"><div class="value positive">12</div><div class="label">精英存档</div></div>
    </div>
    <div class="anomaly-alert normal" style="margin-top:10px">🧬 上次进化: 2026-05-26 22:15 | 新策略数: 15 | 最优夏普: 2.35</div>`;
}
function trainAllModels(){alert('正在启动模型训练矩阵...\n启用模型: DeepEnsemble, MambaTS, TFT, RL, GP, Anomaly\n预计时间: 5-15分钟');}
function evolveGeneration(){alert('🧬 触发策略进化...\n交叉: 13个后代 | 变异: 7个后代\n新一代种群已生成');refreshAll();}
function saveState(){alert('💾 状态已保存\n- 模型权重\n- 精英档案\n- 进化历史');}
document.addEventListener('DOMContentLoaded',refreshAll);
</script></body></html>
