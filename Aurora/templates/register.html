<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora 量化交易系统 - 注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0d14;
            --bg-card: #111620;
            --accent-cyan: #00d4c8;
            --accent-blue: #4a7dff;
            --accent-purple: #7c5cfc;
            --accent-gold: #c9a84c;
            --text-primary: #e8ecf1;
            --text-secondary: #8895a9;
            --glass-bg: rgba(17, 22, 32, 0.85);
            --input-bg: rgba(255, 255, 255, 0.04);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --danger: #e74c5c;
            --success: #00c853;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-deep);
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: var(--text-primary);
        }

        /* 动态粒子背景 */
        #particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 网格线背景 */
        .grid-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(74, 125, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74, 125, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(ellipse 80% 70% at center, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 80% 70% at center, black 20%, transparent 70%);
        }

        /* 光晕效果 */
        .radial-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.35;
        }
        .glow-1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0, 180, 216, 0.4) 0%, transparent 70%);
            top: -15%; left: -10%;
            animation: floatGlow1 12s ease-in-out infinite;
        }
        .glow-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(124, 92, 252, 0.35) 0%, transparent 70%);
            bottom: -15%; right: -8%;
            animation: floatGlow2 14s ease-in-out infinite;
        }
        .glow-3 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(74, 125, 255, 0.3) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: pulseGlow 8s ease-in-out infinite;
        }

        @keyframes floatGlow1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 40px); }
        }
        @keyframes floatGlow2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-40px, -30px); }
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.35; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* 注册卡片 */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 40px 36px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-blue), transparent);
        }

        /* Logo */
        .brand-section {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            color: white;
            box-shadow: 0 4px 16px rgba(0, 212, 200, 0.3);
        }
        .brand-title {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* 表单 */
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 16px;
            transition: color 0.3s;
            z-index: 2;
        }
        .form-control {
            width: 100%;
            padding: 13px 14px 13px 42px;
            background: var(--input-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.3s;
            outline: none;
            caret-color: #ffffff;
        }
        .form-control::selection {
            background: rgba(0, 212, 200, 0.3);
            color: #ffffff;
        }
        .form-control:focus {
            border-color: var(--accent-cyan);
            background: rgba(0, 212, 200, 0.05);
            box-shadow: 0 0 0 3px rgba(0, 212, 200, 0.15);
        }
        .form-control:focus + .input-icon,
        .form-control:focus ~ .input-icon {
            color: var(--accent-cyan);
        }

        /* 密码可见切换 */
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            transition: color 0.3s;
            z-index: 2;
        }
        .password-toggle:hover {
            color: var(--accent-cyan);
        }

        /* 密码强度指示器 */
        .password-strength {
            margin-top: 8px;
            display: flex;
            gap: 4px;
        }
        .strength-bar {
            flex: 1;
            height: 3px;
            background: var(--border-subtle);
            border-radius: 2px;
            transition: all 0.3s;
        }
        .strength-bar.active.weak { background: var(--danger); }
        .strength-bar.active.medium { background: var(--accent-gold); }
        .strength-bar.active.strong { background: var(--success); }
        .strength-text {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 注册按钮 */
        .btn-register {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 212, 200, 0.35);
        }
        .btn-register:active {
            transform: translateY(0);
        }
        .btn-register::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        .btn-register:hover::before {
            left: 100%;
        }
        .btn-register.loading {
            pointer-events: none;
            opacity: 0.85;
        }
        .btn-register .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        .btn-register.loading .spinner {
            display: inline-block;
        }
        .btn-register.loading .btn-text {
            display: none;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 错误提示 */
        .error-message {
            background: rgba(231, 76, 92, 0.1);
            border: 1px solid rgba(231, 76, 92, 0.3);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 18px;
            font-size: 13px;
            color: var(--danger);
            display: none;
            animation: shakeError 0.4s ease-in-out;
        }
        @keyframes shakeError {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .error-message.show {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 成功提示 */
        .success-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 200, 83, 0.1);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            animation: successFade 0.5s ease-out;
            border-radius: 20px;
            z-index: 100;
        }
        .success-overlay.show {
            display: flex;
        }
        @keyframes successFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .success-icon {
            width: 60px; height: 60px;
            background: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: successPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes successPop {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .success-icon i {
            font-size: 30px;
            color: white;
        }
        .success-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--success);
        }

        /* 登录提示 */
        .login-hint {
            text-align: center;
            margin-top: 22px;
            padding-top: 20px;
            border-top: 1px solid var(--border-subtle);
            font-size: 13px;
            color: var(--text-secondary);
        }
        .login-hint a {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }
        .login-hint a:hover {
            color: var(--accent-blue);
        }

        /* 版本信息 */
        .version-info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 24px;
                border-radius: 16px;
            }
            .brand-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 动态背景 -->
    <canvas id="particleCanvas"></canvas>
    <div class="grid-overlay"></div>
    <div class="radial-glow glow-1"></div>
    <div class="radial-glow glow-2"></div>
    <div class="radial-glow glow-3"></div>

    <!-- 返回导航栏按钮 -->
    <div style="position: fixed; top: 20px; left: 20px; z-index: 100;">
        <a href="/" style="display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: rgba(0, 212, 200, 0.1); border: 1px solid rgba(0, 212, 200, 0.2); border-radius: 8px; color: var(--accent-cyan); text-decoration: none; font-size: 14px; transition: all 0.3s; backdrop-filter: blur(10px);" onmouseover="this.style.background='rgba(0,212,200,0.2)'" onmouseout="this.style.background='rgba(0,212,200,0.1)'">
            <i class="bi bi-arrow-left"></i> 返回首页
        </a>
    </div>

    <!-- 注册卡片 -->
    <div class="login-wrapper">
        <div class="login-card">
            <!-- 成功动画 -->
            <div class="success-overlay" id="successOverlay">
                <div class="success-icon">
                    <i class="bi bi-check-lg"></i>
                </div>
                <div class="success-text">注册成功！</div>
            </div>

            <!-- Logo -->
            <div class="brand-section">
                <div class="logo-icon">
                    <i class="bi bi-person-plus-fill"></i>
                </div>
                <div class="brand-title">创建账号</div>
                <div class="brand-subtitle">加入 Aurora 量化交易平台</div>
            </div>

            <!-- 错误提示 -->
            <div class="error-message" id="errorMessage">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span id="errorText">注册失败</span>
            </div>

            <!-- 注册表单 -->
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <div class="input-wrapper">
                        <input
                            type="text"
                            class="form-control"
                            id="username"
                            placeholder="请输入用户名（3-20位字母或数字）"
                            autocomplete="username"
                            required
                            minlength="3"
                            maxlength="20"
                            pattern="[a-zA-Z0-9_]+"
                        >
                        <i class="bi bi-person input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            placeholder="请输入密码（至少6位）"
                            autocomplete="new-password"
                            required
                            minlength="6"
                        >
                        <i class="bi bi-lock input-icon"></i>
                        <i class="bi bi-eye password-toggle" id="togglePassword"></i>
                    </div>
                    <!-- 密码强度 -->
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar" data-index="0"></div>
                        <div class="strength-bar" data-index="1"></div>
                        <div class="strength-bar" data-index="2"></div>
                    </div>
                    <div class="strength-text" id="strengthText">请输入密码</div>
                </div>

                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            class="form-control"
                            id="confirmPassword"
                            placeholder="请再次输入密码"
                            autocomplete="new-password"
                            required
                        >
                        <i class="bi bi-shield-lock input-icon"></i>
                        <i class="bi bi-eye password-toggle" id="toggleConfirmPassword"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">登录城市</label>
                    <div class="input-wrapper">
                        <select class="form-control" id="city">
                            <option value="青州">青州</option>
                            <option value="烟台" selected>烟台</option>
                            <option value="北京">北京</option>
                            <option value="上海">上海</option>
                            <option value="深圳">深圳</option>
                        </select>
                        <i class="bi bi-geo-alt input-icon"></i>
                    </div>
                </div>

                <button type="submit" class="btn-register" id="registerBtn">
                    <span class="spinner"></span>
                    <span class="btn-text">
                        <i class="bi bi-person-plus"></i>
                        立即注册
                    </span>
                </button>
            </form>

            <!-- 登录提示 -->
            <div class="login-hint">
                已有账号？<a href="/login">立即登录</a>
            </div>
        </div>
    </div>

    <div class="version-info">
        Aurora v2.0 · Powered by DeepSeek AI
    </div>

    <script>
        // ========== 粒子动画 ==========
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const PARTICLE_COUNT = 80;
        const CONNECTION_DISTANCE = 120;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 212, 200, ${this.opacity})`;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
        }

        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < CONNECTION_DISTANCE) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(74, 125, 255, ${0.15 * (1 - dist / CONNECTION_DISTANCE)})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            connectParticles();
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        // ========== 密码显示/隐藏 ==========
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.className = type === 'password' ? 'bi bi-eye password-toggle' : 'bi bi-eye-slash password-toggle';
        });

        const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        toggleConfirmPassword.addEventListener('click', () => {
            const type = confirmPasswordInput.type === 'password' ? 'text' : 'password';
            confirmPasswordInput.type = type;
            toggleConfirmPassword.className = type === 'password' ? 'bi bi-eye password-toggle' : 'bi bi-eye-slash password-toggle';
        });

        // ========== 密码强度检测 ==========
        const strengthBars = document.querySelectorAll('.strength-bar');
        const strengthText = document.getElementById('strengthText');

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            let strength = 0;
            
            if (val.length >= 6) strength++;
            if (val.length >= 10) strength++;
            if (/[A-Z]/.test(val) && /[a-z]/.test(val) && /[0-9]/.test(val)) strength++;
            if (/[!@#$%^&*(),.?":{}|<>]/.test(val)) strength++;
            
            // 归一化到 0-3
            let level = 0;
            if (val.length === 0) level = 0;
            else if (val.length < 6) level = 0;
            else if (strength <= 1) level = 1;
            else if (strength <= 2) level = 2;
            else level = 3;

            strengthBars.forEach((bar, index) => {
                bar.className = 'strength-bar';
                if (index < level) {
                    if (level === 1) bar.classList.add('active', 'weak');
                    else if (level === 2) bar.classList.add('active', 'medium');
                    else if (level === 3) bar.classList.add('active', 'strong');
                }
            });

            const texts = ['请输入密码', '弱 - 建议增加复杂度', '中 - 可以加强', '强 - 密码安全'];
            strengthText.textContent = texts[level];
        });

        // ========== 注册处理 ==========
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successOverlay = document.getElementById('successOverlay');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const city = document.getElementById('city').value;

            // 验证
            if (!username || !password || !confirmPassword) {
                showError('请填写所有必填字段');
                return;
            }

            if (username.length < 3 || username.length > 20) {
                showError('用户名长度需在3-20位之间');
                return;
            }

            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                showError('用户名只能包含字母、数字和下划线');
                return;
            }

            if (password.length < 6) {
                showError('密码长度至少6位');
                return;
            }

            if (password !== confirmPassword) {
                showError('两次输入的密码不一致');
                return;
            }

            // 显示加载状态
            registerBtn.classList.add('loading');
            errorMessage.classList.remove('show');

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        username, 
                        password, 
                        city
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // 显示成功动画
                    successOverlay.classList.add('show');

                    // 延迟跳转到登录页
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    showError(data.message || '注册失败，请稍后重试');
                    registerBtn.classList.remove('loading');
                }

            } catch (error) {
                console.error('注册请求失败:', error);
                showError('网络错误，请稍后重试');
                registerBtn.classList.remove('loading');
            }
        });

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');

            // 3秒后自动隐藏
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 3000);
        }

        // ========== 输入框动画增强 ==========
        const inputs = document.querySelectorAll('.form-control');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('focused');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('focused');
            });
        });

        // ========== 键盘事件 ==========
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !registerBtn.classList.contains('loading')) {
                registerForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
