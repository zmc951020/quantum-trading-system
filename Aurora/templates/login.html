<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Aurora量化交易系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .login-container { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        .login-title { text-align: center; margin-bottom: 30px; color: #007bff; }
        .form-group { margin-bottom: 20px; }
        .btn-login { width: 100%; }
        .register-link { text-align: center; margin-top: 20px; }
        .error-message { color: red; text-align: center; margin-top: 15px; }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 40px; }
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            color: #666;
        }
        .toggle-password:hover { color: #007bff; }
        .remember-me { display: flex; align-items: center; margin-bottom: 15px; }
        .remember-me input { margin-right: 8px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 class="login-title">Aurora量化交易系统</h1>
        <h2 class="text-center mb-4">用户登录</h2>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" class="form-control" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <div class="password-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="请输入密码" required>
                    <button type="button" class="toggle-password" id="toggle-password" title="显示/隐藏密码">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-eye" viewBox="0 0 16 16">
                            <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
                            <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="remember-me">
                <input type="checkbox" id="remember-me">
                <label for="remember-me">记住我（30天）</label>
            </div>
            <button type="submit" class="btn btn-primary btn-login">登录</button>
        </form>
        
        <div class="register-link">
            <p>还没有账户？ <a href="#" id="register-link">立即注册</a></p>
            <p>忘记密码？ <a href="#" id="forgot-password-link">找回密码</a></p>
        </div>
        
        <div id="error-message" class="error-message" style="display: none;"></div>
    </div>

    <!-- 注册模态框 -->
    <div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="registerModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="registerModalLabel">用户注册</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="register-form">
                        <div class="form-group">
                            <label for="reg-username">用户名</label>
                            <input type="text" id="reg-username" class="form-control" placeholder="请输入用户名" required>
                        </div>
                        <div class="form-group">
                            <label for="reg-password">密码</label>
                            <input type="password" id="reg-password" class="form-control" placeholder="请输入密码" required>
                        </div>
                        <div class="form-group">
                            <label for="reg-email">邮箱</label>
                            <input type="email" id="reg-email" class="form-control" placeholder="请输入邮箱" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="register-btn">注册</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 找回密码模态框 -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="forgotPasswordModalLabel">找回密码</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="forgot-password-form">
                        <div class="form-group">
                            <label for="forgot-email">邮箱</label>
                            <input type="email" id="forgot-email" class="form-control" placeholder="请输入注册时的邮箱" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="forgot-password-btn">提交</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 修改密码模态框 -->
    <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-labelledby="changePasswordModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="changePasswordModalLabel">修改密码</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="change-password-form">
                        <div class="form-group">
                            <label for="old-password">旧密码</label>
                            <input type="password" id="old-password" class="form-control" placeholder="请输入旧密码" required>
                        </div>
                        <div class="form-group">
                            <label for="new-password">新密码</label>
                            <input type="password" id="new-password" class="form-control" placeholder="请输入新密码" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="change-password-btn">确认修改</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 页面加载时自动填充保存的账户密码
        window.onload = function() {
            const savedUsername = localStorage.getItem('saved_username');
            const savedPassword = localStorage.getItem('saved_password');
            const rememberMe = localStorage.getItem('remember_me');

            if (rememberMe === 'true' && savedUsername && savedPassword) {
                document.getElementById('username').value = savedUsername;
                document.getElementById('password').value = savedPassword;
                document.getElementById('remember-me').checked = true;
            }
        };

        // 密码显示/隐藏切换
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('svg');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.innerHTML = '<path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/><path d="M2 2L14 14M6.5 6.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7z"/>';
            } else {
                passwordInput.type = 'password';
                icon.innerHTML = '<path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/><path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>';
            }
        });

        // 登录表单提交
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // 保存会话ID到本地存储
                    localStorage.setItem('session_id', data.session_id);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // 处理记住密码功能
                    const rememberMe = document.getElementById('remember-me').checked;
                    if (rememberMe) {
                        localStorage.setItem('saved_username', username);
                        localStorage.setItem('saved_password', password);
                        localStorage.setItem('remember_me', 'true');
                    } else {
                        localStorage.removeItem('saved_username');
                        localStorage.removeItem('saved_password');
                        localStorage.setItem('remember_me', 'false');
                    }

                    // 设置cookie，确保后端能获取到session_id
                    const maxAge = rememberMe ? 30 * 24 * 60 * 60 : 24 * 60 * 60; // 30天或1天
                    document.cookie = `session_id=${data.session_id}; path=/; max-age=${maxAge}`;

                    // 跳转到主页面
                    window.location.href = '/';
                } else {
                    document.getElementById('error-message').textContent = data.message || '登录失败';
                    document.getElementById('error-message').style.display = 'block';
                }
            })
            .catch(error => {
                document.getElementById('error-message').textContent = '登录失败，请稍后重试';
                document.getElementById('error-message').style.display = 'block';
            });
        });

        // 注册链接点击
        document.getElementById('register-link').addEventListener('click', function(e) {
            e.preventDefault();
            const registerModal = new bootstrap.Modal(document.getElementById('registerModal'));
            registerModal.show();
        });

        // 注册按钮点击
        document.getElementById('register-btn').addEventListener('click', function() {
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const email = document.getElementById('reg-email').value;
            
            fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password, email: email })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('注册成功，请登录');
                    const registerModal = bootstrap.Modal.getInstance(document.getElementById('registerModal'));
                    registerModal.hide();
                } else {
                    alert('注册失败: ' + data.message);
                }
            })
            .catch(error => {
                alert('注册失败，请稍后重试');
            });
        });

        // 忘记密码链接点击
        document.getElementById('forgot-password-link').addEventListener('click', function(e) {
            e.preventDefault();
            const forgotPasswordModal = new bootstrap.Modal(document.getElementById('forgotPasswordModal'));
            forgotPasswordModal.show();
        });

        // 找回密码按钮点击
        document.getElementById('forgot-password-btn').addEventListener('click', function() {
            const email = document.getElementById('forgot-email').value;
            
            fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert(`密码已重置，临时密码：${data.temp_password}\n请使用临时密码登录后修改密码`);
                    const forgotPasswordModal = bootstrap.Modal.getInstance(document.getElementById('forgotPasswordModal'));
                    forgotPasswordModal.hide();
                } else {
                    alert('找回密码失败: ' + data.message);
                }
            })
            .catch(error => {
                alert('找回密码失败，请稍后重试');
            });
        });

        // 修改密码按钮点击
        document.getElementById('change-password-btn').addEventListener('click', function() {
            const oldPassword = document.getElementById('old-password').value;
            const newPassword = document.getElementById('new-password').value;
            
            fetch('/api/auth/change-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Session-ID': localStorage.getItem('session_id')
                },
                body: JSON.stringify({ old_password: oldPassword, new_password: newPassword })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('密码修改成功，请重新登录');
                    const changePasswordModal = bootstrap.Modal.getInstance(document.getElementById('changePasswordModal'));
                    changePasswordModal.hide();
                    // 清除会话信息，让用户重新登录
                    localStorage.removeItem('session_id');
                    localStorage.removeItem('user');
                    document.cookie = 'session_id=; path=/; max-age=0';
                    window.location.href = '/';
                } else {
                    alert('密码修改失败: ' + data.message);
                }
            })
            .catch(error => {
                alert('密码修改失败，请稍后重试');
            });
        });

        // 检查是否已登录
        // 只有在user_manager可用时才进行重定向
        // 避免在user_manager不可用时导致无限循环
        if (localStorage.getItem('session_id')) {
            // 先检查会话是否有效
            fetch('/api/auth/validate', {
                headers: {
                    'X-Session-ID': localStorage.getItem('session_id')
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.valid) {
                    window.location.href = '/';
                } else {
                    // 会话无效，清除localStorage
                    localStorage.removeItem('session_id');
                    localStorage.removeItem('user');
                }
            })
            .catch(error => {
                // API调用失败，清除localStorage
                localStorage.removeItem('session_id');
                localStorage.removeItem('user');
            });
        }
    </script>
</body>
</html>
