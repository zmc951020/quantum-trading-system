<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora量化交易系统 - 登录</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a1f2e;
            --border: #2a3040;
            --accent: #00d4aa;
            --accent-glow: rgba(0, 212, 170, 0.3);
            --text-primary: #e8eaed;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.3);
            --input-bg: #0f131e;
            --input-focus: #1a2440;
            --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', 'Courier New', monospace;
            --font-sans: 'Segoe UI Variable', 'Inter', 'Microsoft YaHei UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            font-synthesis: none !important;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            font-variation-settings: 'wght' 400;
        }

        /* Background animation */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            background-image:
                linear-gradient(rgba(0, 212, 170, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 170, 0.5) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }

        .bg-orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .bg-orb-2 {
            width: 350px;
            height: 350px;
            background: #6366f1;
            bottom: -100px;
            left: -100px;
            animation-delay: -4s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 420px;
            max-width: 95vw;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            font-size: 48px;
            margin-bottom: 12px;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 8px var(--accent-glow)); }
            50% { filter: drop-shadow(0 0 20px var(--accent-glow)); }
        }

        .login-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 0.02em;
            color: var(--text-primary);
            font-family: var(--font-sans);
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--accent);
            margin-top: 6px;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 212, 170, 0.05);
            backdrop-filter: blur(10px);
        }

        .login-card:hover {
            border-color: rgba(0, 212, 170, 0.2);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 212, 170, 0.05);
            transition: all 0.3s ease;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: var(--font-sans);
            transition: all 0.2s ease;
            outline: none;
            font-variation-settings: 'wght' 400;
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            background: var(--input-focus);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input.error {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px var(--danger-glow);
        }

        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--danger);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
            animation: shake 0.4s ease;
        }

        .error-message.show {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), #00b894);
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: all 0.25s ease;
            font-family: var(--font-sans);
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px var(--accent-glow);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-login .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        .btn-login.loading .spinner {
            display: inline-block;
        }

        .btn-login.loading .btn-text {
            opacity: 0.7;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .system-info {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 8px;
        }

        .system-info span {
            background: rgba(0, 212, 170, 0.08);
            border: 1px solid rgba(0, 212, 170, 0.15);
            border-radius: 6px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            font-family: var(--font-mono);
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">📊</div>
            <div class="login-title">Aurora 量化交易系统</div>
            <div class="login-subtitle">· 多策略智能体 · 三级风控 ·</div>
        </div>

        <div class="login-card">
            <div class="error-message" id="errorMsg">
                <span>⚠️</span>
                <span id="errorText"></span>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label class="form-label" for="username">👤 用户名</label>
                    <input
                        type="text"
                        id="username"
                        class="form-input"
                        placeholder="请输入用户名"
                        autocomplete="off"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">🔐 密码</label>
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="请输入密码"
                        autocomplete="off"
                        required
                    >
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="spinner"></span>
                    <span class="btn-text">登 录</span>
                </button>
            </form>
        </div>

        <div class="login-footer">
            <div style="margin-bottom: 4px;">安全量化交易平台 v3.0</div>
            <div class="system-info">
                <span>牧羊人 V5</span>
                <span>牧羊人 V6</span>
                <span>三级风控</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const form = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');

            // Check for flash messages or error params in URL
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('error')) {
                showError(decodeURIComponent(urlParams.get('error')));
                // Clean URL without reloading
                if (window.history && window.history.replaceState) {
                    const cleanUrl = window.location.pathname;
                    window.history.replaceState({}, document.title, cleanUrl);
                }
            }

            // If already logged in (has valid session cookie), redirect to dashboard
            // The server will handle this on the / route, but we can also check here
            // by doing a quick heartbeat check
            checkExistingSession();

            function showError(msg) {
                errorText.textContent = msg;
                errorMsg.classList.add('show');
                usernameInput.classList.add('error');
                passwordInput.classList.add('error');
                // Auto-hide after 5 seconds
                clearTimeout(window._errorTimeout);
                window._errorTimeout = setTimeout(hideError, 5000);
            }

            function hideError() {
                errorMsg.classList.remove('show');
                usernameInput.classList.remove('error');
                passwordInput.classList.remove('error');
            }

            function setLoading(isLoading) {
                if (isLoading) {
                    loginBtn.classList.add('loading');
                    loginBtn.disabled = true;
                } else {
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                }
            }

            async function checkExistingSession() {
                try {
                    const resp = await fetch('/api/check_session', {
                        method: 'GET',
                        credentials: 'same-origin'
                    });
                    if (resp.ok) {
                        const data = await resp.json();
                        if (data.authenticated) {
                            // Already logged in, go to dashboard
                            window.location.replace('/');
                        }
                    }
                } catch (e) {
                    // Server not reachable or no session - stay on login page
                }
            }

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                hideError();

                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                if (!username || !password) {
                    showError('请输入用户名和密码');
                    return;
                }

                if (username.length < 2) {
                    showError('用户名至少需要2个字符');
                    return;
                }

                if (password.length < 4) {
                    showError('密码至少需要4个字符');
                    return;
                }

                setLoading(true);

                try {
                    const resp = await fetch('/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        credentials: 'same-origin',
                        body: JSON.stringify({
                            username: username,
                            password: password
                        })
                    });

                    const data = await resp.json();

                    if (resp.ok && data.success) {
                        // Login successful - redirect to dashboard
                        window.location.href = data.redirect || '/';
                    } else {
                        const errorMsg = data.message || '登录失败，请检查用户名和密码';
                        showError(errorMsg);
                        // Shake effect on card
                        const card = document.querySelector('.login-card');
                        card.style.animation = 'shake 0.4s ease';
                        setTimeout(() => {
                            card.style.animation = '';
                        }, 400);
                    }
                } catch (err) {
                    console.error('Login error:', err);
                    showError('网络连接失败，请检查服务器是否运行');
                } finally {
                    setLoading(false);
                }
            });

            // Focus username on load
            usernameInput.focus();

            // Allow Enter key to submit
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && document.activeElement === passwordInput) {
                    form.dispatchEvent(new Event('submit'));
                }
            });
        })();
    </script>
</body>
</html>
