global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'memx-ollama'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  - job_name: 'memx-api'
    static_configs:
      - targets: ['memx-api:8000']
        labels:
          service: 'memx-api'
          component: 'backend'
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-master:6379']
        labels:
          service: 'redis'
          role: 'master'
      - targets: ['redis-replica:6379']
        labels:
          service: 'redis'
          role: 'replica'

  - job_name: 'ollama'
    static_configs:
      - targets: ['ollama:11434']
        labels:
          service: 'ollama'
    metrics_path: '/api/metrics'
    scrape_interval: 30s

  - job_name: 'nginx'
    static_configs:
      - targets: ['trading-nginx:9113']
        labels:
          service: 'nginx'

  - job_name: 'docker'
    static_configs:
      - targets: ['host.docker.internal:9323']
        labels:
          service: 'docker'
          component: 'engine'
