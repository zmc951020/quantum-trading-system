global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'memx-ollama'
    environment: 'prod'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - 'alert_rules.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'memx-api'
    static_configs:
      - targets: ['memx-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'qdrant'
    static_configs:
      - targets: ['memx-qdrant-1:6333']
    metrics_path: '/metrics'

  - job_name: 'neo4j'
    static_configs:
      - targets: ['memx-neo4j-core1:7474']
    metrics_path: '/metrics'

  - job_name: 'redis'
    static_configs:
      - targets: ['memx-redis-master:6379']
    metrics_path: '/metrics'

  - job_name: 'kafka'
    static_configs:
      - targets: ['memx-kafka:9092']
    metrics_path: '/metrics'